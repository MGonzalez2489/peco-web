<div class="page">
  <div class="d-flex justify-content-center mb-3">
    <mat-button-toggle-group [(ngModel)]="selectedType" aria-label="Font Style">
      @for (eType of entryTypes; track eType.publicId) {
        <mat-button-toggle [value]="eType">{{
          eType.displayName
        }}</mat-button-toggle>
      }
    </mat-button-toggle-group>
  </div>
  <div class="d-flex justify-content-center">
    <form [formGroup]="form" (submit)="submit()">
      <mat-form-field>
        <mat-label>Cantidad</mat-label>
        <input
          matInput
          type="number"
          formControlName="amount"
          placeholder="0"
          tabindex="1"
          autofocus
        />
        <span matTextPrefix>$&nbsp;</span>
      </mat-form-field>
      <mat-form-field>
        <mat-label>Descripcion</mat-label>
        <input
          matInput
          type="text"
          formControlName="description"
          placeholder="Description"
        />
      </mat-form-field>
      <app-category-select
        formControlName="category"
        [isRequired]="true"
      ></app-category-select>

      <div class="d-flex justify-content-end mt-5">
        <button (click)="cancel()" type="button" class="me-3" mat-button>
          Cancelar
        </button>

        <button mat-flat-button type="submit">Guardar</button>
      </div>
      <pre>{{ form.value | json }}</pre>
    </form>
  </div>
</div>
