<div class="page">
  <div class="d-flex justify-content-center">
    <form [formGroup]="form" (submit)="submit()">
      <app-entry-type formControlName="entryType"></app-entry-type>

      <mat-form-field>
        <mat-label>Cantidad</mat-label>
        <input
          matInput
          type="number"
          formControlName="amount"
          placeholder="0"
          tabindex="1"
          autofocus
        />
        <span matTextPrefix>$&nbsp;</span>
      </mat-form-field>
      <mat-form-field>
        <mat-label>Descripcion</mat-label>
        <input
          matInput
          type="text"
          formControlName="description"
          placeholder="Description"
          tabindex="2"
        />
      </mat-form-field>
      <app-category-select
        formControlName="category"
        [isRequired]="true"
        tabindex="3"
      ></app-category-select>

      <div class="d-flex justify-content-end mt-5">
        <button
          (click)="cancel()"
          type="button"
          class="me-3"
          mat-button
          tabindex="5"
        >
          Cancelar
        </button>

        <button mat-flat-button type="submit" tabindex="4">Guardar</button>
      </div>
    </form>
  </div>
</div>
