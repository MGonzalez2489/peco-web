<div>
  @if (account$ | async; as account) {
    <mat-card class="m-5 d-flex" appearance="outlined">
      <mat-card-content class="d-flex justify-content-between">
        <p>Cuenta: {{ account.name }}</p>
        <p>Balance: {{ account.balance | currency }}</p>
      </mat-card-content>
    </mat-card>

    <app-table [source]="table" (changeMeta)="search($event)"></app-table>
  }
</div>
