<div>
  @if (account$ | async; as account) {
    <mat-card class="m-5 d-flex" appearance="outlined">
      <mat-card-content class="d-flex justify-content-between">
        <p>Cuenta: {{ account.name }}</p>
        <p>Balance: {{ account.balance | currency }}</p>
      </mat-card-content>
    </mat-card>

    @if (entries) {
      <div>
        <!-- Table -->
        <table mat-table [dataSource]="entries.data" class="mat-elevation-z8">
          <!-- Description Column -->
          <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef>Description</th>
            <td mat-cell *matCellDef="let element">
              {{ element.description }}
            </td>
          </ng-container>

          <!-- CreatedAt Column -->
          <ng-container matColumnDef="created">
            <th mat-header-cell *matHeaderCellDef>Created At</th>
            <td mat-cell *matCellDef="let element">
              {{ element.createdAt | date: "medium" }}
            </td>
          </ng-container>

          <!-- Type Column -->
          <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef>Type</th>
            <td mat-cell *matCellDef="let element">{{ element.type }}</td>
          </ng-container>

          <!-- Amount Column -->
          <ng-container matColumnDef="amount">
            <th mat-header-cell *matHeaderCellDef>Amount</th>
            <td mat-cell *matCellDef="let element">
              {{ element.amount | currency }}
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
        <mat-paginator
          #paginator
          class="demo-paginator"
          (page)="handlePageEvent($event, account.publicId)"
          [length]="entries.meta.itemCount"
          [pageSize]="entries.meta.take"
          [showFirstLastButtons]="true"
          [pageSizeOptions]="[5, 10, 25]"
          [hidePageSize]="false"
          [pageIndex]="entries.meta.page"
          aria-label="Select page"
        >
        </mat-paginator>

        <!-- End table -->
      </div>
    }
  }
</div>
