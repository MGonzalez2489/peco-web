<div class="page">
  <div class="container d-flex justify-content-center">
    <form [formGroup]="form" (submit)="submit()">
      <mat-form-field>
        <input
          matInput
          type="text"
          formControlName="name"
          placeholder="Name"
          autofocus
          tabindex="0"
        />
      </mat-form-field>
      <mat-form-field>
        <input
          matInput
          type="number"
          formControlName="initialBalance"
          placeholder="Balance"
        />
      </mat-form-field>
      <div class="d-flex justify-content-end">
        <button mat-button (click)="cancel()">Cancelar</button>
        <button class="w-25 ms-3" mat-flat-button type="submit">Guardar</button>
      </div>
    </form>
  </div>
</div>
