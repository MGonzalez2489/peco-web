<div class="container">
  <div class="d-flex justify-content-end align-items-center">
    <mat-form-field>
      <mat-label>Search by name</mat-label>
      <input [(ngModel)]="table.meta.hint" matInput placeholder="Placeholder" />
    </mat-form-field>
    <button mat-flat-button class="mb-3" (click)="search(table.meta)">
      Buscar
    </button>
  </div>
  <app-table
    [source]="table"
    (view)="view($event)"
    (changeMeta)="search($event)"
  ></app-table>
</div>
