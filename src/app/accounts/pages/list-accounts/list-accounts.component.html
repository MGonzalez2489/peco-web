<div class="container">
  <div class="d-flex justify-content-ends align-items-center">
    <mat-form-field class="mat-form" appearance="outline">
      <mat-label>Search by name</mat-label>
      <input [(ngModel)]="table.meta.hint" matInput placeholder="Placeholder" />
    </mat-form-field>
    <button mat-flat-button (click)="search(table.meta)">Buscar</button>
  </div>
  <app-table [source]="table" (changeMeta)="search($event)"></app-table>
</div>
