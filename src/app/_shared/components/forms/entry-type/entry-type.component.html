<mat-button-toggle-group
  [formControl]="selected"
  aria-label="Entry Type Selector"
  class="w-100 mb-4"
  (change)="selectValue($event)"
  name="entryTypeBtnGp"
>
  @for (eType of entryTypes; track eType.publicId) {
    <mat-button-toggle class="w-100" [value]="eType">{{
      eType.displayName
    }}</mat-button-toggle>
  }
</mat-button-toggle-group>
